# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build --if-present
        env:
          # Dummy values for CI build
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXT_PUBLIC_API_URL: https://dummy.example.com
          SESSION_SECRET: dummy-session-secret-for-ci-build-only-not-real
          CLOUDINARY_CLOUD_NAME: dummy-cloud
          CLOUDINARY_API_KEY: dummy-key
          CLOUDINARY_API_SECRET: dummy-secret
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dummy-cloud
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: dummy-preset
          CRON_SECRET: dummy-cron-secret

  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
      - run: npm ci
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
