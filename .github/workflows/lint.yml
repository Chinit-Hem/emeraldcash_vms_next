name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    # Prevent indefinite hanging - fail fast if ESLint takes too long
    timeout-minutes: 5
    permissions:
      contents: read
      statuses: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        # Added timeout to prevent hanging on large file sets
        run: npx eslint src --ext .ts,.tsx --max-warnings 100
        timeout-minutes: 3
